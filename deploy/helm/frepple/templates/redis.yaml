apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frepple.name" . }}-redis
  labels: {{- include "frepple.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "frepple.name" . }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "frepple.name" . }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            tcpSocket: { port: 6379 }
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frepple.name" . }}-redis
  labels: {{- include "frepple.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "frepple.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
