name: Engine UBSan

# Debug build with UndefinedBehaviorSanitizer over the C++ engine golden-test
# suite. Complements engine-asan.yml: ASan catches memory errors (overflows,
# use-after-free); UBSan catches undefined behaviour the optimiser is free to
# miscompile - signed-integer overflow, invalid shifts, misaligned/null pointer
# use, out-of-range float->int casts (e.g. the static_cast<long>(NaN) class), and
# bad enum/bool loads. Same golden scenarios, a different sanitizer lens.
#
# Sanitizer selected via -DFREPPLE_SANITIZER=undefined (CMakeLists.txt). The
# -fsanitize=vptr check is excluded there (frePPLe's hand-rolled MetaClass RTTI
# is incompatible with it - see tools/modernization/ubsan-baseline.md).
#
# BLOCKING: the golden suite is UBSan-clean. The baseline findings were resolved
# (operationdependency null member-call fixed; the iterator operator* null-binding
# idiom marked FREPPLE_NO_SANITIZE_NULL), so halt_on_error=1 + abort makes a NEW
# UB site fail CI - same contract as engine-asan.
#
# Path-filtered so doc/CI/gate-only commits don't trigger the heavy Debug build.

on:
  push:
    branches:
      - "modernization"
      - "modernization/**"
    paths:
      - "src/**"
      - "include/**"
      - "test/**"
      - "CMakeLists.txt"
      - ".github/workflows/engine-ubsan.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ubsan:
    name: Debug + UBSan engine tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checking out source code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Nodes
        uses: actions/setup-node@v6

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install --no-upgrade libxerces-c-dev openssl libssl-dev libpq5 libpq-dev postgresql-client python3 python3-dev python3-venv python3-setuptools
          sudo npm -g install pnpm@latest-10
          pnpm install --frozen-lockfile

      - name: Build (Debug + UndefinedBehaviorSanitizer)
        # -DFREPPLE_SANITIZER=undefined swaps ASan for UBSan in the Debug flags.
        run: |
          git submodule update --remote --checkout --force
          grunt
          cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug -DFREPPLE_SANITIZER=undefined
          cmake --build ${{github.workspace}}/build --config Debug -- -j 4
          . ${{github.workspace}}/venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV

      - name: Run engine golden tests under UBSan
        working-directory: ${{github.workspace}}
        # halt_on_error=1 + abort: a single UB diagnostic fails the run (blocking).
        # print_stacktrace=1: pinpoint the source line.
        # runtest.py -d streams child stdout/stderr (otherwise it PIPEs and
        # discards it) so the UBSan report is visible in the log, not just a bare
        # non-zero exit. tee + pipefail keeps the report for the summary step.
        run: |
          set -o pipefail
          export FREPPLE_DATE_STYLE="day-month-year"
          export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1:abort_on_error=1:report_error_type=1"
          ./test/runtest.py -d 2>&1 | tee ubsan-output.log

      - name: Summarise UBSan findings
        if: always()
        working-directory: ${{github.workspace}}
        # On a green run this is empty; on a regression it shows the new UB site(s)
        # deduped by source location (per-run address stripped).
        run: |
          echo "## UBSan findings (distinct site x check)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -hE "runtime error:" ubsan-output.log 2>/dev/null \
            | sed -E "s/address 0x[0-9a-f]+/address 0x.../" \
            | sort | uniq -c | sort -rn >> "$GITHUB_STEP_SUMMARY" \
            || echo "(no UBSan findings - clean)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Keep logs
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ubsan_logs
          path: logs
          retention-days: 3
