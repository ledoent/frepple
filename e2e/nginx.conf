# Single same-origin proxy for the E2E stack (resolved Q4: same-origin + JWT).
# Routes by path: websockets + engine services -> daphne (ASGI), REST/UI ->
# Django (WSGI), everything else -> the Next.js SPA.
#
# Routing table — keep in sync with the Helm Ingress
# (deploy/helm/frepple/templates/ingress.yaml) and the frontend next.config.mjs
# dev rewrites. These match the DEFAULT scenario (empty URL prefix) only.
upstream wsgi { server web-wsgi:8000; }
upstream asgi { server web-asgi:8001; }
upstream spa  { server frontend:3000; }

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;

  # Websockets (live task progress / log tail).
  location /ws/ {
    proxy_pass http://asgi;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
  }

  # Engine HTTP services (forecast save / flush) - ASGI. Scoped to the exact
  # service paths so the SPA's /forecast editor route is not shadowed.
  location /forecast/detail/ { proxy_pass http://asgi; proxy_set_header Host $http_host; }
  location /flush/           { proxy_pass http://asgi; proxy_set_header Host $http_host; }

  # REST API + Django UI/admin/login + task launch - WSGI. (The SPA owns
  # /execute; only /execute/launch/* is the Django launch endpoint.)
  location /api/   { proxy_pass http://wsgi; proxy_set_header Host $http_host; }
  location /data/  { proxy_pass http://wsgi; proxy_set_header Host $http_host; }
  location /static/ { proxy_pass http://wsgi; proxy_set_header Host $http_host; }
  location /execute/launch/ { proxy_pass http://wsgi; proxy_set_header Host $http_host; }

  # Everything else - the SPA.
  location / { proxy_pass http://spa; proxy_set_header Host $http_host; }
}
