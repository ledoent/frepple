apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frepple.name" . }}-frontend
  labels: {{- include "frepple.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "frepple.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "frepple.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.image.registry }}/{{ .Values.image.frontend }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 3000 }
          readinessProbe:
            httpGet: { path: /execute, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frepple.name" . }}-frontend
  labels: {{- include "frepple.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "frepple.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
