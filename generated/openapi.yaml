openapi: 3.0.3
info:
  title: frePPLe API
  version: 1.0.0
  description: REST API for the frePPLe planning application.
paths:
  /api/common/attribute/:
    get:
      operationId: common_attribute_list
      description: |-
        Customized API view for the REST framework.:
            - support for request-specific scenario database
            - add 'title' to the context of the html view
      parameters:
      - in: query
        name: editable
        schema:
          type: boolean
      - in: query
        name: initially_hidden
        schema:
          type: boolean
      - in: query
        name: lastmodified
        schema:
          type: string
          format: date-time
      - in: query
        name: lastmodified__gt
        schema:
          type: string
          format: date-time
      - in: query
        name: lastmodified__gte
        schema:
          type: string
          format: date-time
      - in: query
        name: lastmodified__in
        schema:
          type: array
          items:
            type: string
            format: date-time
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: lastmodified__lt
        schema:
          type: string
          format: date-time
      - in: query
        name: lastmodified__lte
        schema:
          type: string
          format: date-time
      - in: query
        name: model
        schema:
          type: string
          enum:
          - apikey
          - bucket
          - bucketdetail
          - buffer
          - calendar
          - calendarbucket
          - constraint
          - customer
          - demand
          - forecast
          - item
          - itemdistribution
          - itemsupplier
          - location
          - operation
          - operationdependency
          - operationmaterial
          - operationplan
          - operationplanmaterial
          - operationplanresource
          - operationresource
          - problem
          - resource
          - resourceskill
          - setupmatrix
          - setuprule
          - skill
          - suboperation
          - supplier
          - user
          - workorder
        description: |-
          * `calendar` - calendar
          * `supplier` - supplier
          * `item` - item
          * `location` - location
          * `customer` - customer
          * `demand` - demand
          * `operation` - operation
          * `operationplan` - operationplan
          * `operationplanmaterial` - operationplanmaterial
          * `setupmatrix` - setupmatrix
          * `skill` - skill
          * `resource` - resource
          * `operationplanresource` - operationplanresource
          * `suboperation` - suboperation
          * `setuprule` - setuprule
          * `resourceskill` - resourceskill
          * `operationresource` - operationresource
          * `operationmaterial` - operationmaterial
          * `itemsupplier` - itemsupplier
          * `itemdistribution` - itemdistribution
          * `calendarbucket` - calendarbucket
          * `buffer` - buffer
          * `operationdependency` - operationdependency
          * `workorder` - workorder
          * `forecast` - forecast
          * `constraint` - constraint
          * `problem` - problem
          * `user` - user
          * `bucket` - bucket
          * `bucketdetail` - bucketdetail
          * `apikey` - apikey
      - in: query
        name: model__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: name__contains
        schema:
          type: string
      - in: query
        name: name__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: source
        schema:
          type: string
      - in: query
        name: source__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      tags:
      - common
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PatchedAttribute'
          description: ''
    post:
      operationId: common_attribute_create
      description: |-
        Customized API view for the REST framework.:
            - support for request-specific scenario database
            - add 'title' to the context of the html view
      tags:
      - common
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAttribute'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAttribute'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAttribute'
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchedAttribute'
          description: ''
    put:
