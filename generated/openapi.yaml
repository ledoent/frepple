components:
  schemas:
    Attribute:
      type: object
      description: |-
        The django model serializer extends the default implementation with the
        following capabilities:
          - Ability to work with natural keys.
          - Support for create-or-update on the POST method.
            The default POST method only supports create.
            The PUT method remains update-only.
          - Enable partial updates by default
      properties:
        model:
          $ref: '#/components/schemas/ModelEnum'
        name:
          type: string
        label:
          type: string
        editable:
          type: boolean
        initially_hidden:
          type: boolean
        source:
          type: string
          nullable: true
        lastmodified:
          type: string
          format: date-time
          readOnly: true
          title: Last modified
      required:
      - label
      - lastmodified
    BlankEnum:
      enum:
      - ''
    Bucket:
      type: object
      description: |-
        The django model serializer extends the default implementation with the
        following capabilities:
          - Ability to work with natural keys.
          - Support for create-or-update on the POST method.
            The default POST method only supports create.
            The PUT method remains update-only.
          - Enable partial updates by default
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        level:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Higher values indicate more granular time buckets
        source:
          type: string
          nullable: true
        lastmodified:
          type: string
          format: date-time
          readOnly: true
          title: Last modified
      required:
      - lastmodified
      - level
