{{- /*
  Django SECRET_KEY (also the JWT/web-token signing key). Generated once and
  preserved across `helm upgrade` via a lookup of the existing secret, so a
  rollout doesn't invalidate live sessions/tokens. Set .Values.secretKey to pin
  it explicitly (e.g. to share a key across replicas/envs).
*/ -}}
{{- $name := printf "%s-secret" (include "frepple.name" .) -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) -}}
{{- $key := "" -}}
{{- if .Values.secretKey -}}
{{-   $key = .Values.secretKey -}}
{{- else if and $existing $existing.data (index $existing.data "SECRET_KEY") -}}
{{-   $key = index $existing.data "SECRET_KEY" | b64dec -}}
{{- else -}}
{{-   $key = randAlphaNum 50 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels: {{- include "frepple.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ $key | quote }}
