apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frepple.name" . }}-app
  labels: {{- include "frepple.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  # The worker writes task logs to a pod-local emptyDir that the asgi container
  # tails, so the app is single-replica until RWX storage is available.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "frepple.name" . }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "frepple.name" . }}
        app.kubernetes.io/component: app
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: logs
          emptyDir: {}
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/{{ .Values.image.app }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["wsgi"]
          env:
            {{- include "frepple.env" . | nindent 12 }}
            {{- if .Values.app.initRunplan }}
            - name: FREPPLE_INIT_RUNPLAN
              value: "1"
            {{- end }}
          ports:
            - { name: http, containerPort: 8000 }
          volumeMounts:
            - { name: logs, mountPath: /app/logs }
          # Probe with the public Host header: with DEBUG off + a real
          # ALLOWED_HOSTS, a bare pod-IP Host would be rejected (DisallowedHost).
          readinessProbe:
            httpGet:
              path: /data/login/
              port: 8000
              httpHeaders:
                - { name: Host, value: {{ .Values.host | quote }} }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /data/login/
              port: 8000
              httpHeaders:
                - { name: Host, value: {{ .Values.host | quote }} }
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6
          resources: {{- toYaml .Values.app.web.resources | nindent 12 }}
        - name: asgi
          image: "{{ .Values.image.registry }}/{{ .Values.image.app }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["asgi"]
          env:
            {{- include "frepple.env" . | nindent 12 }}
          ports:
            - { name: ws, containerPort: 8001 }
          volumeMounts:
            - { name: logs, mountPath: /app/logs }
          readinessProbe:
            tcpSocket: { port: 8001 }
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: 8001 }
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6
          resources: {{- toYaml .Values.app.asgi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frepple.name" . }}-app
  labels: {{- include "frepple.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "frepple.name" . }}
    app.kubernetes.io/component: app
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
    - { name: ws, port: 8001, targetPort: 8001 }
